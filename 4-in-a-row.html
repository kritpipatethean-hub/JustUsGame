<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-in-a-Row - Easy Brain Game Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <a href="index.html" class="back-link">← Back to Hub</a>
            <h2 class="glow-text" style="font-size: 2rem; margin:0;">4-in-a-Row</h2>
        </div>

        <main class="glass-panel" style="width: 100%; max-width: 600px; margin: 0 auto;">
            <div id="status-display" class="status-bar">Connecting to game...</div>
            
            <div class="board-container">
                <div id="game-board" class="board">
                    <!-- JS will populate 42 cells here -->
                </div>
            </div>

            <div class="mt-8">
                <button id="btn-reset" class="secondary-btn hidden">Play Again</button>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="4-in-a-row.js"></script>
</body>
</html>
